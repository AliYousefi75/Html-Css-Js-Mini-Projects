<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Cards</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.0.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="cards-container">
      <div class="card">
        <div class="holder">
          <div class="image">
            <img src="./assets/user-1.jpg" alt="user-1" />
          </div>
        </div>
        <h1>Alex</h1>
        <p>Software Engineer</p>
        <div class="socials">
          <span><i class="ri-facebook-fill"></i></span>
          <span><i class="ri-twitter-fill"></i></span>
          <span><i class="ri-google-fill"></i></span>
          <span><i class="ri-linkedin-fill"></i></span>
        </div>
      </div>
      <div class="card">
        <div class="holder">
          <div class="image">
            <img src="./assets/user-2.jpg" alt="user-1" />
          </div>
        </div>
        <h1>Sofia</h1>
        <p>Network Engineer</p>
        <div class="socials">
          <span><i class="ri-facebook-fill"></i></span>
          <span><i class="ri-twitter-fill"></i></span>
          <span><i class="ri-google-fill"></i></span>
          <span><i class="ri-linkedin-fill"></i></span>
        </div>
      </div>
      <div class="card">
        <div class="holder">
          <div class="image">
            <img src="./assets/user-3.jpg" alt="user-1" />
          </div>
        </div>
        <h1>Ali</h1>
        <p>Front-End Developer</p>
        <div class="socials">
          <span><i class="ri-facebook-fill"></i></span>
          <span><i class="ri-twitter-fill"></i></span>
          <span><i class="ri-google-fill"></i></span>
          <span><i class="ri-linkedin-fill"></i></span>
        </div>
      </div>
      <div class="card">
        <div class="holder">
          <div class="image">
            <img src="./assets/user-4.jpg" alt="user-1" />
          </div>
        </div>
        <h1>Charlotte</h1>
        <p>Data Engineer</p>
        <div class="socials">
          <span><i class="ri-facebook-fill"></i></span>
          <span><i class="ri-twitter-fill"></i></span>
          <span><i class="ri-google-fill"></i></span>
          <span><i class="ri-linkedin-fill"></i></span>
        </div>
      </div>
    </div>
  </body>
</html>
