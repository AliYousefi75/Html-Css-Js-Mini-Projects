<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css">
    <title>Professional Profile Card</title>
</head>
<body>
    <div class="profile-card">
        <div class="header">
            <img src="./assets/user.jpg" alt="profile">
            <button class="follow-btn">FOLLOW</button>
        </div>
        <div class="content">
            <div class="content-left">
                <h1>Jack Dep</h1>
                <p>@Dejak</p>
                <hr>
                <div class="media">
                    <div class="followers">
                        <span class="count">11.5k</span>
                        <span class="text">Followers</span>
                    </div>
                    <div class="avatars">
                        <img src="./assets/profile-pic-1.jpg" alt="avatar">
                        <img src="./assets/profile-pic-2.jpg" alt="avatar">
                        <img src="./assets/profile-pic-3.jpg" alt="avatar">
                        <img src="./assets/profile-pic-4.jpg" alt="avatar">
                    </div>
                </div>

            </div>
            <div class="content-right">
                <div class="feed-card">
                    <div class="feed">
                        <img src="./assets/user.jpg" alt="profile">
                        <div class="feed-content">
                            <h5>What an amazing day. I love being a programmer!</h5>
                            <div class="social-icons">
                                <div class="icon">
                                    <i class="ri-heart-fill"></i>10
                                </div>
                                <div class="icon">
                                    <i class="ri-time-line"></i>1h ago
                                </div>
                            </div>
                        </div>
                    </div>
                    <hr>
                    <div class="feed">
                        <img src="assets/user.jpg" alt="profile">
                        <div class="feed-content">
                            <h5>My decision to move from london to NY paid off!</h5>
                            <div class="social-icons">
                                <div class="icon">
                                    <i class="ri-heart-fill"></i>16
                                </div>
                                <div class="icon">
                                    <i class="ri-time-line"></i>8h ago
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    





</body>
</html>
